<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{url_for('static', path='css/signUp.css')}}">
</head>
<body>
    <div class="card">
        <div class="signup">
            <img src="{{ url_for('static', path='imgs/profile_img.jpg') }}" alt="profile">
            <p>Sign Up here</p>
        </div>
        <form>
            <input type="text" name="username" id="username" placeholder="Username" required>
            <input type="email" name="email" id="email" placeholder="Email" required>

            <input type="text" name="first-name" id="first-name" placeholder="First name" required>
            <input type="text" name="last-name" id="last-name" placeholder="Last name" required>
            
            <textarea name="bio" id="bio" maxlength="500" placeholder="Bio"></textarea>

            <input type="tel" name="phone" id="phone" placeholder="Phone number" pattern="^09\d{9}$" required>
            <input type="date" name="date" id="date" placeholder="Date of birth" required>

            <input type="password" name="password" id="password" placeholder="Password" required>

            <button type="submit">Sign Up</button>
        </form>
    </div>
    <p class="login">Already signed in?<a href="{{ url_for('login') }}"> Login here</a></p>
</body>
</html>
